<header class="navbar">

  <!-- Left: Page title -->
  <div class="navbar-left">
    <div class="navbar-title">{{ pageTitle }}</div>
    <div class="navbar-breadcrumb">{{ breadcrumb }}</div>
  </div>

  <!-- Right: Actions -->
  <div class="navbar-right">

    <!-- Date chip -->
    <div class="navbar-date-chip">
      📅 {{ currentDate | date:'EEE d MMM yyyy' : '' : 'fr' }}
    </div>

    <!-- Notifications -->
    <div class="navbar-icon-btn" title="Notifications">
      🔔
      <div class="navbar-notif-dot"></div>
    </div>

    <!-- Search -->
    <div class="navbar-icon-btn" title="Recherche">
      🔍
    </div>
    <div class="navbar-icon-btn" title="Déconnexion" (click)="logout()">
  🚪
</div>

    <!-- Avatar -->
    <div class="navbar-avatar-chip">
      <div class="navbar-avatar">
  {{ getInitials() }}
</div>
<div>
  <div class="navbar-avatar-name">{{ user?.nom }}</div>
  <div class="navbar-avatar-role">{{ user?.role }}</div>
</div>
    </div>

  </div>

</header>
