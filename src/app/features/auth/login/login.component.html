<div class="relative min-h-screen w-full flex bg-cover bg-center bg-no-repeat bg-gray-200"
  style="background-image: url('images/bg-login.png');">


  <!-- Left Panel -->
  <div
    class="w-full sm:w-[450px] min-h-screen bg-white/90 backdrop-blur-md flex flex-col justify-center px-12 lg:px-16 shadow-[20px_0_50px_rgba(0,0,0,0.1)] z-10">

    <!-- Logo area -->
    <div class="mb-20 text-center flex justify-center">
      <img src="images/logo-gym.png" alt="Logo de la salle" class="max-h-28 w-auto">
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="login()" class="flex flex-col gap-6 w-full max-w-[320px] mx-auto">

      <!-- Username / login -->
      <div class="relative flex items-center border-b-[1.5px] border-gray-400 py-2">
        <!-- SVG User Icon -->
        <svg class="w-5 h-5 text-gray-500 mr-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
        <input type="text" name="username" [(ngModel)]="username" placeholder="login" autofocus
          class="w-full bg-transparent outline-none text-gray-800 placeholder-gray-500 text-sm font-medium" />
      </div>

      <!-- Password -->
      <div class="relative flex items-center border-b-[1.5px] border-gray-400 py-2 mt-4">
        <!-- SVG Lock Icon -->
        <svg class="w-5 h-5 text-gray-500 mr-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
          </path>
        </svg>
        <input type="password" name="password" [(ngModel)]="password" placeholder="password"
          class="w-full bg-transparent outline-none text-gray-800 placeholder-gray-500 text-sm font-medium" />
      </div>

      <!-- Submit Button -->
      <button type="submit"
        class="mt-12 w-full bg-[#70b9d6] hover:bg-[#5daac9] text-gray-900 font-bold text-xs py-3.5 px-4 rounded transition duration-300 uppercase tracking-wider shadow-sm">
        SING IN
      </button>
      <div *ngIf="erreur" class="text-red-500 text-sm text-center mt-2">
        {{ erreur }}
      </div>
    </form>
  </div>
</div>
