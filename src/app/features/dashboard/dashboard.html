<ng-container *ngIf="userRole === 'admin'; else personnelDashboard">
  <app-admin-dashboard></app-admin-dashboard>
</ng-container>

<ng-template #personnelDashboard>
  <ng-container *ngIf="userRole === 'personnel'; else loginPage">
    <app-personnel-dashboard></app-personnel-dashboard>
  </ng-container>
</ng-template>

<ng-template #loginPage>
  <!-- Page login / mock login -->
  <div class="p-8 text-center text-gray-500 flex flex-col items-center justify-center min-h-[50vh]">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 max-w-md w-full">
      <h3 class="text-lg font-medium text-gray-900 mb-2">Authentification Requise</h3>
      <p class="text-sm text-gray-500 mb-6">
        Veuillez vous connecter pour accéder à l'application.
      </p>
      <div class="space-y-3">
        <button (click)="mockLogin('admin')" class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition duration-200">
          Voir Dashboard Admin
        </button>
        <button (click)="mockLogin('personnel')" class="w-full px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition duration-200">
          Voir Dashboard Personnel
        </button>
      </div>
    </div>
  </div>
</ng-template>
